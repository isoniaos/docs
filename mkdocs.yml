site_name: IsoniaOS Docs
site_url: https://docs.isonia.org/
repo_url: https://github.com/isoniaos/docs
repo_name: isoniaos/docs
docs_dir: site
site_dir: public

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.details
  - pymdownx.superfences

nav:
  - Home: index.md
  - Whitepaper: whitepaper.md
  - Roadmap: roadmap.md
  - Overview:
      - What is IsoniaOS: overview/what-is-isoniaos.md
      - Why governance lifecycle: overview/why-governance-lifecycle.md
      - Architecture: overview/architecture.md
      - Authority model: overview/authority-model.md
      - Trust boundaries: overview/trust-boundaries.md
  - Getting started:
      - Self-hosted overview: getting-started/self-hosted-overview.md
      - Local development: getting-started/local-development.md
      - Configuration: getting-started/configuration.md
  - Organizations:
      - Create organization: organizations/create-organization.md
      - Activation: organizations/activation.md
      - Governance structure: organizations/governance-structure.md
  - Proposals:
      - Lifecycle: proposals/lifecycle.md
      - Routes and approvals: proposals/routes-and-approvals.md
      - Execution: proposals/execution.md
      - Accountability and evidence: proposals/accountability-and-evidence.md
      - Governance memory: proposals/governance-memory.md
  - Developers:
      - Repository map: developers/repository-map.md
      - Contracts: developers/contracts.md
      - Control Plane: developers/control-plane.md
      - SDK: developers/sdk.md
      - App Core: developers/app-core.md
      - Integration Lab: developers/integration-lab.md
  - Operators:
      - Deployment: operators/deployment.md
      - Diagnostics: operators/diagnostics.md
      - Security posture: operators/security-posture.md
