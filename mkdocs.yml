site_name: IsoniaOS Docs
site_url: https://docs.isonia.org/
repo_url: https://github.com/isoniaos/docs
repo_name: isoniaos/docs
docs_dir: site
site_dir: public

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Whitepaper: whitepaper.md
  - Roadmap: roadmap.md
  - Getting started:
      - Overview: getting-started/index.md
      - Prerequisites: getting-started/prerequisites.md
      - Local development: getting-started/local-development.md
      - Configuration: getting-started/configuration.md
      - Troubleshooting: getting-started/troubleshooting.md
  - Concepts:
      - Governance lifecycle: concepts/governance-lifecycle.md
      - Accountability and evidence: concepts/accountability-and-evidence.md
      - Authority and trust: concepts/authority-and-trust.md
  - Developers:
      - Overview: developers/index.md
      - Repository map: developers/repository-map.md
      - Contracts: developers/contracts.md
      - Control Plane: developers/control-plane.md
      - SDK: developers/sdk.md
      - App Core: developers/app-core.md
  - Operators:
      - Overview: operators/index.md
      - Local runtime: operators/local-runtime.md
      - Configuration boundaries: operators/configuration-boundaries.md
      - Diagnostics: operators/diagnostics.md
      - Current limitations: operators/limitations.md
  - Reference:
      - Repository links: reference/repository-links.md
      - Configuration summary: reference/configuration-summary.md
      - Glossary: reference/glossary.md
