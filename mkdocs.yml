site_name: IsoniaOS Docs
site_url: https://docs.isonia.org/
repo_url: https://github.com/isoniaos/docs
repo_name: isoniaos/docs
docs_dir: site
site_dir: public

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Litepaper: litepaper.md
  - Whitepaper: whitepaper.md
  - Roadmap: roadmap.md
  - Learn:
      - Overview: learn/index.md
      - Governance lifecycle: learn/governance-lifecycle.md
      - Organizations: learn/organizations.md
      - Roles and permissions: learn/roles-and-permissions.md
      - Templates: learn/templates.md
      - Decisions, execution, and evidence: learn/decisions-execution-evidence.md
      - Accountability: learn/accountability.md
      - Trust and authority: learn/trust-and-authority.md
  - User Guide:
      - Overview: user-guide/index.md
      - Create an organization: user-guide/create-organization.md
      - Activate an organization: user-guide/activate-organization.md
      - Roles and permissions: user-guide/roles.md
      - Templates: user-guide/templates.md
      - Proposals and decisions: user-guide/proposals.md
      - Execution and evidence: user-guide/execution-and-evidence.md
      - Accountability: user-guide/accountability.md
      - Troubleshooting: user-guide/troubleshooting.md
  - Developers:
      - Technical overview: developers/index.md
  - Reference:
      - Glossary: reference/glossary.md
